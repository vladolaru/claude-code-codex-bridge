name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-and-build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected_tag = f"v{version}"
          actual_tag = "${{ github.ref_name }}"
          if actual_tag != expected_tag:
              raise SystemExit(f"Tag {actual_tag!r} does not match package version {expected_tag!r}")
          PY

      - name: Run tests
        run: pytest tests -q

      - name: Packaging smoke checks
        run: |
          python -m venv .venv-package-smoke
          .venv-package-smoke/bin/python -m pip install --upgrade pip
          .venv-package-smoke/bin/python -m pip install .
          .venv-package-smoke/bin/cc-codex-bridge --help
          .venv-package-smoke/bin/python -m cc_codex_bridge --help
          python -m build --sdist --wheel

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  publish-github-release:
    needs: validate-and-build
    runs-on: macos-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
