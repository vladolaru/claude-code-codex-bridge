name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests -q

      - name: Packaging smoke checks
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          import importlib.metadata
          import re
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          print(project["version"])
          Path("dist").mkdir(exist_ok=True)
          with Path("dist/runtime-deps.txt").open("w", encoding="utf-8") as handle:
              for requirement in project["dependencies"]:
                  requirement_without_marker = requirement.split(";", 1)[0].strip()
                  name = re.split(r"[<>=!~\[]", requirement_without_marker, maxsplit=1)[0].strip()
                  handle.write(f"{name}=={importlib.metadata.version(name)}\n")
          PY
          )"
          python -m build --sdist --wheel
          python -m pip download --only-binary=:all: --dest .wheelhouse -r dist/runtime-deps.txt
          cp dist/*.whl .wheelhouse/
          python -m venv .venv-package-smoke
          .venv-package-smoke/bin/python -m pip install --no-index --find-links .wheelhouse "cc-codex-bridge==${PACKAGE_VERSION}"
          .venv-package-smoke/bin/cc-codex-bridge --help
          .venv-package-smoke/bin/python -m cc_codex_bridge --help
          # doctor may exit 1 in CI (claude CLI not installed) — verify JSON parses and has expected checks
          .venv-package-smoke/bin/cc-codex-bridge doctor --json > doctor-output.json || true
          python -c "import json, sys; d=json.load(open('doctor-output.json')); checks={c['name'] for c in d['checks']}; assert 'python' in checks and 'codex_home' in checks, f'missing checks: {checks}'"
        shell: bash
