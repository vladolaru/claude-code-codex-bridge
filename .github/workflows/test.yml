name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests -q

      - name: Packaging smoke checks
        run: |
          python -m venv .venv-package-smoke
          .venv-package-smoke/bin/python -m pip install --upgrade pip
          .venv-package-smoke/bin/python -m pip install .
          .venv-package-smoke/bin/cc-codex-bridge --help
          .venv-package-smoke/bin/python -m cc_codex_bridge --help
          python -m build --sdist --wheel
